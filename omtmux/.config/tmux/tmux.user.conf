# User customization layer for Omarchy's tmux base.
# Sourced from tmux.conf via `source-file ~/.config/tmux/tmux.user.conf`.

# TPM — plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Plugins (defaults verified non-conflicting; see KEYBINDINGS.md)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'timvx/tmux-assistant-resurrect'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Auto-restore last session on tmux server start
set -g @continuum-restore 'on'

# Replace C-M-S-arrows resize with Alt-hjkl (vim-motion friendly)
unbind -n C-M-S-Left
unbind -n C-M-S-Right
unbind -n C-M-S-Up
unbind -n C-M-S-Down

# Alt-hjkl: resize pane in tmux, pass through to nvim when nvim is the focused process.
# is_vim predicate is the same regex vim-tmux-navigator uses for its own C-hjkl passthrough.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?|fzf)(diff)?$'"
bind -n 'M-h' if-shell "$is_vim" 'send-keys M-h' 'resize-pane -L 5'
bind -n 'M-j' if-shell "$is_vim" 'send-keys M-j' 'resize-pane -D 5'
bind -n 'M-k' if-shell "$is_vim" 'send-keys M-k' 'resize-pane -U 5'
bind -n 'M-l' if-shell "$is_vim" 'send-keys M-l' 'resize-pane -R 5'

# TPM init — MUST be the last line of this file
run '~/.config/tmux/plugins/tpm/tpm'
