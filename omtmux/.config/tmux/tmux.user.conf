# User customization layer for Omarchy's tmux base.
# Sourced from tmux.conf via `source-file ~/.config/tmux/tmux.user.conf`.

# TPM — plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Plugins (defaults verified non-conflicting; see KEYBINDINGS.md)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'timvx/tmux-assistant-resurrect'

# Auto-restore last session on tmux server start
set -g @continuum-restore 'on'

# TPM init — MUST be the last line of this file
run '~/.config/tmux/plugins/tpm/tpm'
