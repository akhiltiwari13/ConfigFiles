# monitor = DP-1, 2560x1440@75, 0x0, 1
# monitor = DP-3, 2560x1440@75, 2560x0, 1, transform, 1
# monitor = eDP-1, 1920x1200@60, 4000x0, 1, transform , 1

# work setup current. dual-m/c setup
# monitor = eDP-1, 1920x1200@60, 0x0, 1
# monitor = DP-1, 2560x1440@75, 1920x0, 1

# workstation setup ongoing 02/06/2026 resumed agaion on 2026-06-20 14:32
# Bind by desc:/serial — DP-x connector names flip between boots (both externals are identical BenQ GW3290QT).
monitor = desc:BNQ BenQ GW3290QT ACP00296019, 2560x1440@75, 2560x0, 1   # middle external (was DP-3)
monitor = desc:BNQ BenQ GW3290QT 88P00389019, 2560x1440@75, 0x0, 1      # left external   (was DP-1)
monitor = desc:AU Optronics 0xFA9B, 1920x1200@60, 5120x0, 1             # laptop panel    (eDP-1)

# --- Workspace -> monitor pinning + app routing (2026-06-20) ---
# One stable home workspace per monitor, bound by serial.
workspace = 1, monitor:desc:BNQ BenQ GW3290QT ACP00296019, default:true   # middle -> chromium
workspace = 2, monitor:desc:BNQ BenQ GW3290QT 88P00389019, default:true   # left   -> tmux/ghostty
workspace = 3, monitor:desc:AU Optronics 0xFA9B, default:true             # laptop -> slack

# Route apps to their home workspace (new windowrule syntax: match:...).
windowrule = workspace 1, match:class chromium                  # chromium -> middle
windowrule = workspace 3, match:class chrome-app.slack.com.*    # slack webapp (chromium derives this class from the URL; --class is ignored under Wayland) -> laptop
# NOTE: tmux/ghostty is routed by its keybind's [workspace 2] exec-rule (bindings.conf),
# not a class rule, so plain SUPER+RETURN terminals are NOT forced onto the left monitor.

