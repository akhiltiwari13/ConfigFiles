# Extra autostart processes
# exec-once = uwsm-app -- my-service

# Launch the pinned apps at login. Placement is handled per app:
#  - muxy terminal: [workspace 1 silent] exec-rule (ghostty has no unique class to match)
#  - chromium / slack: class-based windowrules in monitors.conf (race-free, no prefix needed)
exec-once = [workspace 1 silent] uwsm-app -- xdg-terminal-exec --dir="$HOME" bash -c "tmux attach || tmux new -s muxy"
exec-once = omarchy-launch-browser
exec-once = omarchy-launch-or-focus-webapp Slack "https://app.slack.com/client/T02FK8UBGPL/activity-inbox"
